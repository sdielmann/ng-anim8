<section id="collapse" class="anim-section">
  <div class="anim-section__header">
    <h2 class="anim-section__title">Collapse</h2>
    <p class="anim-section__desc">Height 0 → auto via CSS grid trick — no JS measurement</p>
  </div>

  <div class="anim-section__controls">
    <button class="btn-toggle" (click)="show.set(!show())">
      {{ show() ? 'Hide' : 'Show' }}
    </button>
    <div class="picker">
      @for (d of durations; track d) {
        <button
          class="picker__btn"
          [class.picker__btn--active]="duration() === d"
          (click)="duration.set(d)">{{ d }}</button>
      }
    </div>
    <div class="picker">
      @for (e of easings; track e) {
        <button
          class="picker__btn"
          [class.picker__btn--active]="easing() === e"
          (click)="easing.set(e)">{{ e }}</button>
      }
    </div>
    <div class="picker">
      <button
        class="picker__btn"
        [class.picker__btn--active]="!fade()"
        (click)="fade.set(false)">no fade</button>
      <button
        class="picker__btn"
        [class.picker__btn--active]="fade()"
        (click)="fade.set(true)">fade</button>
    </div>
    <div class="picker">
      <button
        class="picker__btn"
        [class.picker__btn--active]="!horizontal()"
        (click)="horizontal.set(false)">vertical</button>
      <button
        class="picker__btn"
        [class.picker__btn--active]="horizontal()"
        (click)="horizontal.set(true)">horizontal</button>
    </div>
  </div>

  <div class="anim-section__preview">
    @if (show()) {
      <anim8-collapse [duration]="duration()" [easing]="easing()" [fade]="fade()" [horizontal]="horizontal()">
        <div class="preview-box">Collapse content</div>
      </anim8-collapse>
    }
  </div>

  <app-code-snippet [code]="code()" />
</section>
