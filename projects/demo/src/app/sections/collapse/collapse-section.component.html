<section id="collapse" class="anim-section">
  <div class="anim-section__header">
    <h2 class="anim-section__title">Collapse</h2>
    <p class="anim-section__desc">Height 0 → auto via CSS grid trick — no JS measurement</p>
  </div>

  <div class="anim-section__controls">
    <button class="btn-toggle" (click)="show.set(!show())">
      {{ show() ? 'Hide' : 'Show' }}
    </button>
    <div class="picker">
      @for (d of durations; track d) {
        <button
          class="picker__btn"
          [class.picker__btn--active]="duration() === d"
          (click)="duration.set(d)">{{ d }}</button>
      }
    </div>
  </div>

  <div class="anim-section__preview">
    <anim8-collapse [show]="show()" [duration]="duration()">
      <div class="preview-box">Collapse content</div>
    </anim8-collapse>
  </div>

  <app-code-snippet [code]="code()" />
</section>
